name: CI

# Runs the same green checks we run locally, on every push and PR.
# macOS runner: matches the target platform (Tauri macOS app) and lets `cpal`
# build against CoreAudio without the Linux ALSA dev dependency.
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test · build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # --- Rust toolchain + cache (engine in src-tauri/) ---
      - name: Install Rust (stable) with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- Node toolchain + cache (UI) ---
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      # --- Rust checks (src-tauri/) ---
      - name: rustfmt
        working-directory: src-tauri
        run: cargo fmt --check
      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        # Unit + integration tests. The 60s glitch gate is #[ignore]d (audible,
        # device-dependent) and does not run here. The non-ignored polyphony_smoke
        # DOES run; headless runners have no audio device, so allow it to skip on
        # no-device here (it stays a hard failure on a developer machine).
        env:
          GLITCH_ALLOW_NO_DEVICE: "1"
        run: cargo test

      # --- UI checks ---
      - name: Type-check + build (tsc + vite)
        run: npm run build
      - name: vitest
        run: npm test

  # DEBT-015: actually EXERCISE the headline fitness function on push, instead of
  # letting it skip on a deviceless runner. BlackHole is a userspace CoreAudio HAL
  # plugin (not a kext), so it loads on a coreaudiod restart with no reboot — giving
  # the hosted macOS runner a real default output device. The smoke then runs WITHOUT
  # GLITCH_ALLOW_NO_DEVICE, so a missing device or any underrun is a hard failure.
  audio-smoke:
    name: audio smoke · 16-voice gate (BlackHole)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install BlackHole virtual audio device
        run: |
          brew install blackhole-2ch switchaudio-osx
          # Restart CoreAudio so it discovers the freshly-installed HAL plugin.
          sudo killall coreaudiod || true
          # Wait for the device to appear (cold start), then make it the default output.
          for i in $(seq 1 30); do
            if SwitchAudioSource -a -t output 2>/dev/null | grep -q "BlackHole 2ch"; then
              break
            fi
            sleep 1
          done
          SwitchAudioSource -t output -s "BlackHole 2ch"
          # Verify BlackHole actually became the default — fail loudly here rather
          # than letting the downstream gate fail with an ambiguous "no device".
          for i in $(seq 1 10); do
            if SwitchAudioSource -c -t output | grep -q "BlackHole 2ch"; then break; fi
            sleep 1
          done
          SwitchAudioSource -c -t output | grep -q "BlackHole 2ch"
          echo "Default output is now: $(SwitchAudioSource -c -t output)"

      - name: Run the 16-voice polyphony smoke (must NOT skip)
        working-directory: src-tauri
        # No GLITCH_ALLOW_NO_DEVICE: with BlackHole present the gate runs for real —
        # asserts the full 16-voice pool sounds with 0 underruns and 0 dropped events.
        run: cargo test --test glitch_free_60s polyphony_smoke -- --nocapture
